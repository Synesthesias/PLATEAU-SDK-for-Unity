# Unityプロジェクトのコンパイルエラーを検知するワークフロー
# プルリクエスト作成時に自動実行されます
# 新規のUnityプロジェクトを作成し、このパッケージのコードを配置してコンパイルチェックを行います

name: Compile Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  compile-check:
    name: Check for compilation errors
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-2022.3.25f1-windows-mono-3.2.1
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    
    
    steps:
      - name: Checkout PlateauUnitySDK
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      # package.jsonのハッシュを計算してキャッシュキーに使用
      - name: Calculate package hash
        id: package-hash
        run: |
          PACKAGE_HASH=$(sha256sum package.json | cut -d' ' -f1)
          echo "hash=$PACKAGE_HASH" >> $GITHUB_OUTPUT
          echo "Package hash: $PACKAGE_HASH"

      # unity-project全体をキャッシュ
      - name: Cache Unity project
        id: cache-unity-project
        uses: actions/cache@v3
        with:
          path: unity-project
          key: unity-project-2022.3.25f1-${{ steps.package-hash.outputs.hash }}
          restore-keys: |
            unity-project-2022.3.25f1-

      # キャッシュがヒットしなかった場合のみ、Unityプロジェクトを作成
      - name: Create new Unity project
        if: steps.cache-unity-project.outputs.cache-hit != 'true'
        run: |
          echo "Creating new Unity project..."
          unity-editor -batchmode -nographics -serial ${{ env.UNITY_SERIAL }} -username ${{ env.UNITY_EMAIL }} -password ${{ env.UNITY_PASSWORD }} -createProject unity-project -quit -logFile - || true
          echo "Unity project created"
          ls -la unity-project/


      # 現在のリポジトリのコードをUnityプロジェクトのPackages/PlateauUnitySDKにコピー
      - name: Copy package code to Unity project
        run: |
          echo "Copying PlateauUnitySDK package to Unity project..."
          # 一時ディレクトリにコピーしてから移動（自分自身へのコピーを避けるため）
          mkdir -p /tmp/plateau-package
          cp -r . /tmp/plateau-package/
          # .gitディレクトリと.githubディレクトリを削除
          rm -rf /tmp/plateau-package/.git
          rm -rf /tmp/plateau-package/.github
          rm -rf /tmp/plateau-package/unity-project
          # Unityプロジェクトにコピー
          mkdir -p unity-project/Packages
          cp -r /tmp/plateau-package unity-project/Packages/PlateauUnitySDK
          echo "Package code copied successfully"

      - name: Check compile errors
        run: |
          echo "Checking compile errors..."
          unity-editor \
            -batchmode \
            -nographics \
            -serial ${{ env.UNITY_SERIAL }} \
            -username ${{ env.UNITY_EMAIL }} \
            -password ${{ env.UNITY_PASSWORD }} \
            -projectPath unity-project \
            -quit \
            -logFile -
