# Unityプロジェクトのテストを実行するワークフロー
# プルリクエスト作成時に自動実行されます
# 新規のUnityプロジェクトを作成し、このパッケージのコードを配置してテストを実行します

name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    
    steps:
      - name: Checkout PlateauUnitySDK
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      # compileerrorcheck.zipを解凍
      - name: Extract compileerrorcheck project
        id: extract-project
        run: |
          echo "Extracting compileerrorcheck.zip..."
          unzip -q Ci~/compileerrorcheck.zip -d .
          # 解凍されたプロジェクトのディレクトリ名を確認
          ls -la
          # プロジェクトディレクトリ名を取得（通常はzipファイル名と同じ）
          PROJECT_DIR=$(find . -maxdepth 1 -type d -name "compileerrorcheck*" | head -1)
          if [ -z "$PROJECT_DIR" ]; then
            # ディレクトリが見つからない場合、現在のディレクトリを確認
            echo "Project directory not found, listing contents:"
            ls -la
            exit 1
          fi
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "Project directory: $PROJECT_DIR"

      # 現在のリポジトリのコードを解凍したプロジェクトのPackages/PlateauUnitySDKにコピー
      - name: Copy package code to Unity project
        run: |
          echo "Copying PlateauUnitySDK package to Unity project..."
          PROJECT_DIR="${{ steps.extract-project.outputs.project_dir }}"
          # 一時ディレクトリにコピーしてから移動（自分自身へのコピーを避けるため）
          mkdir -p /tmp/plateau-package
          cp -r . /tmp/plateau-package/
          # .gitディレクトリと.githubディレクトリ、Ci~ディレクトリを削除
          rm -rf /tmp/plateau-package/.git
          rm -rf /tmp/plateau-package/.github
          rm -rf /tmp/plateau-package/Ci~
          # 解凍されたプロジェクトディレクトリも除外
          find /tmp/plateau-package -maxdepth 1 -type d -name "compileerrorcheck*" -exec rm -rf {} +
          # Unityプロジェクトにコピー
          mkdir -p "$PROJECT_DIR/Packages"
          cp -r /tmp/plateau-package "$PROJECT_DIR/Packages/PlateauUnitySDK"
          echo "Package code copied successfully"

      # Unityテストを実行
      - name: Check Compile Errors in Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ env.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ env.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ env.UNITY_SERIAL }}
        with:
          projectPath: ${{ steps.extract-project.outputs.project_dir }}
          targetPlatform: StandaloneWindows64
          buildMethod: ''
          allowDirtyBuild: true
