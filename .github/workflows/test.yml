# Unityプロジェクトのテストを実行するワークフロー
# プルリクエスト作成時に自動実行されます
# 新規のUnityプロジェクトを作成し、このパッケージのコードを配置してテストを実行します

name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  checkCompileErrors:
    name: Check Compile Errors in Unity Project
    runs-on: ubuntu-latest
    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    
    steps:
      - name: Checkout PlateauUnitySDK
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      # package.jsonのハッシュを計算してキャッシュキーに使用
      - name: Calculate package hash
        id: package-hash
        run: |
          PACKAGE_HASH=$(sha256sum package.json | cut -d' ' -f1)
          echo "hash=$PACKAGE_HASH" >> $GITHUB_OUTPUT
          echo "Package hash: $PACKAGE_HASH"

      # unity-project全体をキャッシュ
      - name: Cache Unity project
        id: cache-unity-project
        uses: actions/cache@v3
        with:
          path: unity-project
          key: unity-project-2022.3.25f1-${{ steps.package-hash.outputs.hash }}
          restore-keys: |
            unity-project-2022.3.25f1-

      # キャッシュがヒットしなかった場合のみ、Unityプロジェクトを作成
      - name: Create Project
        if: steps.cache-unity-project.outputs.cache-hit != 'true'
        uses: docker://unityci/editor:ubuntu-2022.3.25f1-windows-mono-3.2.1
        env:
            UNITY_EMAIL: ${{ env.UNITY_EMAIL }}
            UNITY_PASSWORD: ${{ env.UNITY_PASSWORD }}
            UNITY_SERIAL: ${{ env.UNITY_SERIAL }}
        with:
            args: unity-editor -batchmode -quit -nographics -username ${{ env.UNITY_EMAIL }} -password ${{ env.UNITY_PASSWORD }} -serial ${{ env.UNITY_SERIAL }} -createProject unity-project -logFile -

      # 作成されたプロジェクトの所有権を修正（Dockerコンテナ内でrootとして作成されるため）
      - name: Fix permissions
        if: steps.cache-unity-project.outputs.cache-hit != 'true'
        run: sudo chown -R $(id -u):$(id -g) unity-project
  
      # 現在のリポジトリのコードを解凍したプロジェクトのPackages/PlateauUnitySDKにコピー
      - name: Copy package code to Unity project
        run: |
          echo "Copying PlateauUnitySDK package to Unity project..."
          PROJECT_DIR="unity-project"
          ls -la
          # 一時ディレクトリにコピーしてから移動（自分自身へのコピーを避けるため）
          mkdir -p /tmp/plateau-package
          cp -r . /tmp/plateau-package/
          # .gitディレクトリと.githubディレクトリ、Ci~ディレクトリを削除
          rm -rf /tmp/plateau-package/.git
          rm -rf /tmp/plateau-package/.github
          rm -rf /tmp/plateau-package/Ci~
          # 解凍されたプロジェクトディレクトリも除外
          find /tmp/plateau-package -maxdepth 1 -type d -name "compileerrorcheck*" -exec rm -rf {} +
          # Unityプロジェクトにコピー
          mkdir -p "$PROJECT_DIR/Packages"
          cp -r /tmp/plateau-package "$PROJECT_DIR/Packages/PlateauUnitySDK"
          echo "Package code copied successfully"

      - name: Check Compile Errors in Unity Project
        uses: docker://unityci/editor:ubuntu-2022.3.25f1-windows-mono-3.2.1
        env:
            UNITY_EMAIL: ${{ env.UNITY_EMAIL }}
            UNITY_PASSWORD: ${{ env.UNITY_PASSWORD }}
            UNITY_SERIAL: ${{ env.UNITY_SERIAL }}
        with:
            args: unity-editor -batchmode -quit -nographics -username ${{ env.UNITY_EMAIL }} -password ${{ env.UNITY_PASSWORD }} -serial ${{ env.UNITY_SERIAL }} -projectPath unity-project -logFile -
