# Unityプロジェクトのテストを実行するワークフロー
# プルリクエスト作成時に自動実行されます
# 新規のUnityプロジェクトを作成し、このパッケージのコードを配置してテストを実行します

name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  prepare-project:
    name: Prepare Unity Project
    runs-on: ubuntu-latest
    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    outputs:
      project-path: ${{ steps.set-output.outputs.project-path }}
      package-hash: ${{ steps.package-hash.outputs.hash }}
    
    steps:
      - name: Checkout PlateauUnitySDK
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      # package.jsonのハッシュを計算してキャッシュキーに使用
      - name: Calculate package hash
        id: package-hash
        run: |
          PACKAGE_HASH=$(sha256sum package.json | cut -d' ' -f1)
          echo "hash=$PACKAGE_HASH" >> $GITHUB_OUTPUT
          echo "Package hash: $PACKAGE_HASH"

      # unity-project全体をキャッシュ
      - name: Cache Unity project
        id: cache-unity-project
        uses: actions/cache@v3
        with:
          path: unity-project
          key: unity-project-2022.3.25f1-${{ steps.package-hash.outputs.hash }}
          restore-keys: |
            unity-project-2022.3.25f1-

      # キャッシュがヒットしなかった場合のみ、Unityプロジェクトを作成
      - name: Create Project
        if: steps.cache-unity-project.outputs.cache-hit != 'true'
        uses: docker://unityci/editor:ubuntu-2022.3.25f1-windows-mono-3.2.1
        env:
            UNITY_EMAIL: ${{ env.UNITY_EMAIL }}
            UNITY_PASSWORD: ${{ env.UNITY_PASSWORD }}
            UNITY_SERIAL: ${{ env.UNITY_SERIAL }}
        with:
            args: unity-editor -batchmode -quit -nographics -username ${{ env.UNITY_EMAIL }} -password ${{ env.UNITY_PASSWORD }} -serial ${{ env.UNITY_SERIAL }} -createProject unity-project -logFile -

      # 作成されたプロジェクトの所有権を修正（Dockerコンテナ内でrootとして作成されるため）
      - name: Fix permissions
        if: steps.cache-unity-project.outputs.cache-hit != 'true'
        run: sudo chown -R $(id -u):$(id -g) unity-project
  
      # 現在のリポジトリのコードをUnityプロジェクトのPackages/PlateauUnitySDKに移動
      - name: Move package code to Unity project
        run: |
          echo "Moving PlateauUnitySDK package to Unity project..."
          PROJECT_DIR="unity-project"
          # UnityプロジェクトのPackagesディレクトリを作成
          mkdir -p "$PROJECT_DIR/Packages/PlateauUnitySDK"
          # rsyncを使ってunity-projectを除外して直接Packages/PlateauUnitySDKにコピー
          rsync -a --exclude='unity-project' --exclude='.git' --exclude='.github' --exclude='Ci~' --exclude='compileerrorcheck*' . "$PROJECT_DIR/Packages/PlateauUnitySDK/"
          echo "Package code moved successfully"

      - name: Set output
        id: set-output
        run: echo "project-path=unity-project" >> $GITHUB_OUTPUT

  checkCompileErrors:
    name: Check Compile Errors (${{ matrix.docker-image }})
    needs: prepare-project
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        docker-image:
          - unityci/editor:ubuntu-2022.3.25f1-windows-mono-3.2.1
          - unityci/editor:ubuntu-2022.3.25f1-ios-3.2.1
    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    
    steps:
     # unityEditorのdockerイメージが巨大なのでディスク容量を空ける
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true

      # unity-projectをキャッシュから復元（prepare-projectジョブで作成されたもの）
      - name: Restore Unity project
        uses: actions/cache@v3
        with:
          path: unity-project
          key: unity-project-2022.3.25f1-${{ needs.prepare-project.outputs.package-hash }}
          restore-keys: |
            unity-project-2022.3.25f1-

      - name: Check Compile Errors in Unity Project
        id: check-compile
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/unity-project:/project \
            -w /project \
            -e UNITY_EMAIL="${{ env.UNITY_EMAIL }}" \
            -e UNITY_PASSWORD="${{ env.UNITY_PASSWORD }}" \
            -e UNITY_SERIAL="${{ env.UNITY_SERIAL }}" \
            ${{ matrix.docker-image }} \
            unity-editor -batchmode -quit -nographics \
            -username "${{ env.UNITY_EMAIL }}" \
            -password "${{ env.UNITY_PASSWORD }}" \
            -serial "${{ env.UNITY_SERIAL }}" \
            -projectPath /project \
            -buildTarget iOS \
            -logFile -

      # コンパイルエラーが検出された場合、プルリクエストにコメントを追加
      - name: Comment on PR if compile errors found
        if: failure() && steps.check-compile.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // プルリクエストにコメントを追加
            const prNumber = context.payload.pull_request?.number || context.issue.number;
            const dockerImage = '${{ matrix.docker-image }}';
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ コンパイルエラーが検出されました\n\nDockerイメージ: ${dockerImage}\n\n詳細はワークフローのログを確認してください。`
            });
